<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game</title>
  <style>
    #debug-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      min-width: 320px;
      max-width: 420px;
      max-height: calc(100vh - 24px);
      overflow: auto;
      padding: 14px 16px;
      font-family: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #e2e8f0;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }
    #debug-panel h3 {
      margin: 0 0 10px 0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
    }
    #debug-panel section {
      margin-bottom: 14px;
    }
    #debug-panel section:last-child {
      margin-bottom: 0;
    }
    #debug-panel .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    #debug-panel .key { color: #94a3b8; }
    #debug-panel .val { color: #a5f3fc; }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100vh;
      background: #1e293b;
    }
  </style>
</head>
<body style="background: #1e293b; padding: 0; margin: 0; display: block;">
  <canvas id="game-canvas"></canvas>
  <div id="app"></div>
  <div id="debug-panel" aria-live="polite"></div>
  <script type="module" src="./src/index.ts"></script>
</body>
</html>
