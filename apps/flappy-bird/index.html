<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game</title>
  <style>
    #debug-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 500px;
      height: 500px;
      overflow: auto;
      padding: 14px 16px;
      font-family: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #e2e8f0;
      background: rgb(0, 0, 0);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      font-size: 14px;
    }
    #debug-panel h3 {
      margin: 0 0 10px 0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
    }
    #debug-panel section {
      margin-bottom: 14px;
    }
    #debug-panel section:last-child {
      margin-bottom: 0;
    }
    #debug-panel .row,
    #entity-panel .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    #debug-panel .key,
    #entity-panel .key { color: #94a3b8; }
    #debug-panel .val,
    #entity-panel .val { color: #a5f3fc; }
    #entity-panel {
      position: fixed;
      top: calc(12px + 500px + 10px);
      right: 12px;
      width: 500px;
      max-height: 140px;
      overflow: auto;
      padding: 12px 16px;
      font-family: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #e2e8f0;
      background: rgb(0, 0, 0);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }
    #entity-panel h3 {
      margin: 0 0 8px 0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
    }
    #entity-panel .entity-ids {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0 0 0;
      padding: 0;
      list-style: none;
    }
    #entity-panel .entity-id {
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(148, 163, 184, 0.12);
      color: #fde68a;
      font-size: 11px;
    }
    #entity-panel .entity-id--empty {
      color: #64748b;
      background: transparent;
      padding: 0;
    }
    #settings-panel {
      position: fixed;
      top: calc(12px + 500px + 10px + 140px + 10px);
      right: 12px;
      width: 500px;
      padding: 12px 16px;
      font-family: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #e2e8f0;
      background: rgb(0, 0, 0);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }
    #settings-panel h3 {
      margin: 0 0 8px 0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
    }
    #settings-panel .settings-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    #settings-panel .setting-item {
      margin: 0;
    }
    #settings-panel .setting-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      color: #cbd5e1;
    }
    #settings-panel .setting-label input {
      accent-color: #38bdf8;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100vh;
      background: #89b7ff;
    }

    .log-debug {
      color: #bbbbbb;
    }
    .log-info {
      color: #4040dd;
    }
    .log-warn {
      color: #ffaa00;
    }
    .log-error {
      color: #bb1010;
    }
  </style>
</head>
<body style="background: #89b7ff; padding: 0; margin: 0; display: block;">
  <canvas id="game-canvas"></canvas>
  <div id="app"></div>
  <div id="debug-panel" aria-live="polite"></div>
  <div id="entity-panel" aria-live="polite"></div>
  <div id="settings-panel" aria-live="polite"></div>
  <script type="module" src="./src/index.ts"></script>
</body>
</html>
