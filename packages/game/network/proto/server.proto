syntax = "proto3";

package proto.game.network.server;

// ECS Archetype identificator
enum EntityType {
  PLAYER = 0;
}

// Server message
message ServerMessage {
  oneof payload {
    MotionUpdate motidon_updates = 1;
  }
}

// Player connected to the server
message PlayerConnected {
  int32 entity_id = 1;
}

// Position
message Position {
  float x = 1;
  float y = 2;
}

// Player just spawned in the world
message SpawnedPlayer {
  EntityType entity_type = 1;
  Position position = 2;
}

// Player disconnected from the server
message PlayerDisconnected {
  int32 entity_id = 1;
}

// Tick update messages
message MotionUpdate {
  int64                            tick                      = 1;
  repeated MovementDirectionChange movement_direction_change = 2;
  repeated PositionChange          position_change           = 3;
}

// Entity change own movement direction.
// dx, dy is in range [-1, 1].
message MovementDirectionChange {
  int32 entity_id = 1;
  float dx        = 2;
  float dy        = 3;
}

// Some Entity change their position
message PositionChange {
  int32 entity_id = 1;
  Position position = 2;
}
