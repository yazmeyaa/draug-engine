syntax = "proto3";

package proto.game.network.server;

// Set of server-only commands.
message ServerMessage {
  oneof payload {
    PositionBatch          positions = 1;
    MovementDirectionBatch movements = 2;
  }
}

// Entity change own movement direction.
// dx, dy is in range [-1, 1].
message MovementDirection {
  int64 entity_id = 1;
  float dx        = 2;
  float dy        = 3;
}

// Batch of ChangeMovementDirection messages.
message MovementDirectionBatch {
  repeated MovementDirection change_movement_direction = 1;
}

// Some Entity change their position
message PositionChange {
  int64 entity_id = 1;
  float x         = 2;
  float y         = 3;
}

// Batch of ChangePosition messages.
message PositionBatch {
  repeated PositionChange change_position = 1;
}