syntax = "proto3";

package proto.game.network.client;

// Set of client-only commands.
message ClientMessage {
  oneof payload {
    ClientInputUpdate client_input_update = 1;
    ClientMovementDirection client_movement_direction = 2;
    ClientChangeColor client_change_color = 3;
  }
}

// Client input updates
message ClientInputUpdate {
  optional ClientMovementDirection client_movement_direction = 1;
  optional ClientChangeColor       client_change_color       = 2;
}

// Client change own movement direction.
// dx, dy is in range [-1, 1].
message ClientMovementDirection {
  float dx = 2;
  float dy = 3;
}

// Client changes own color
message ClientChangeColor {
  int32 r = 1;
  int32 g = 2;
  int32 b = 3;
}